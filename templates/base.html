<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Painel SaaS{% endblock %}</title>

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <!-- Bootstrap (necessário para componentes como modal em recargas) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <!-- CSS Geral -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- jQuery + DataTables -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
<a class="skip-link" href="#mainContent">Pular para o conteúdo principal</a>

<!-- ============================================================
     SIDEBAR FIXA PREMIUM — FLUENTE E SUAVE
============================================================ -->
<aside class="sidebar" id="sidebar" aria-label="Menu lateral">

    <!-- TÍTULO -->
    <h2 class="side-title">Painel SaaS</h2>

    <!-- LINKS -->
    <nav class="menu">
        <a href="/dashboard" data-nav="/dashboard" title="Dashboard">
            <i class="fas fa-chart-line"></i>
            <span>Dashboard</span>
        </a>

        <a href="/chips" data-nav="/chips" title="Chips">
            <i class="fas fa-sim-card"></i>
            <span>Chips</span>
        </a>

        <a href="/aparelhos" data-nav="/aparelhos" title="Aparelhos">
            <i class="fas fa-mobile-alt"></i>
            <span>Aparelhos</span>
        </a>

        <a href="/movimentacao" data-nav="/movimentacao" title="Movimentação">
            <i class="fas fa-random"></i>
            <span>Movimentação</span>
        </a>

        <a href="/relacionamentos" data-nav="/relacionamentos" title="Relacionamentos">
            <i class="fas fa-link"></i>
            <span>Relacionamentos</span>
        </a>

        <a href="/recargas" data-nav="/recargas" title="Recargas">
            <i class="fas fa-bolt"></i>
            <span>Recargas</span>
        </a>
    </nav>

</aside>

<!-- BOTÃO DE ABERTURA/FECHAMENTO -->
<button class="sidebar-toggle" id="sidebarToggle" aria-label="Alternar menu lateral" aria-expanded="false">
    <i class="fas fa-bars"></i>
</button>


<!-- ============================================================
     ÁREA PRINCIPAL DO SISTEMA
============================================================ -->
<main class="content" id="mainContent" data-layout="page" tabindex="-1">
    {% block content %}
    {% endblock %}
</main>

<div id="toastContainer" class="toast-container"></div>


<!-- ============================================================
     JS DA SIDEBAR (SIMPLIFICADO E EFICIENTE)
============================================================ -->
<script>
    const sidebar = document.getElementById("sidebar");
    const toggle  = document.getElementById("sidebarToggle");
    const body    = document.body;
    const currentPath = window.location.pathname;

    document.querySelectorAll(".menu a[data-nav]").forEach(link => {
        const navPath = link.dataset.nav;
        if (currentPath === navPath || currentPath.startsWith(navPath + "/")) {
            link.classList.add("active");
        }
    });

    toggle.addEventListener("click", () => {
        sidebar.classList.toggle("open");
        body.classList.toggle("sidebar-open");
        toggle.classList.toggle("open");
        toggle.setAttribute("aria-expanded", sidebar.classList.contains("open") ? "true" : "false");
    });

    document.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && sidebar.classList.contains("open")) {
            sidebar.classList.remove("open");
            body.classList.remove("sidebar-open");
            toggle.classList.remove("open");
            toggle.setAttribute("aria-expanded", "false");
        }
    });

    window.showToast = function showToast(message, type = "success") {
        const container = document.getElementById("toastContainer");
        if (!container) return;

        const toast = document.createElement("div");
        toast.className = `toast-message toast-${type}`;
        toast.textContent = message;
        container.appendChild(toast);

        requestAnimationFrame(() => toast.classList.add("show"));
        setTimeout(() => {
            toast.classList.remove("show");
            setTimeout(() => toast.remove(), 240);
        }, 2800);
    };
</script>

</body>
</html>
