{% extends "base.html" %}
{% block title %}Movimentação{% endblock %}
{% block content %}

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="mov-container">

    <div class="page-header">
        <h1><i class="fas fa-random"></i> Movimentação de Chips</h1>
    </div>

    <!-- BUSCA -->
    <div class="search-box">
        <input type="text" id="buscarChip" placeholder="Digite o número do chip...">
        <i class="fas fa-search"></i>
        <div id="autocomplete" class="autocomplete-list"></div>
    </div>
    <div id="quickChips" class="quick-chips"></div>

    <!-- FILTROS -->
    <div class="filters">
        <span class="filter-btn active" data-filter="ALL">Todos</span>
        <span class="filter-btn" data-filter="EVENTO">Eventos</span>
        <span class="filter-btn" data-filter="MOVIMENTO">Movimentos</span>
        <span class="filter-btn" data-filter="APARELHO">Aparelho</span>
    </div>

    <div id="loading">
        <i class="fas fa-spinner fa-spin"></i> Carregando histórico...
    </div>

    <div id="timeline" class="timeline-wrapper"></div>
</div>

<script>
const autocompleteBox = document.getElementById("autocomplete");
const input = document.getElementById("buscarChip");
const timeline = document.getElementById("timeline");
const loading = document.getElementById("loading");

let eventosGlobais = [];
const chipsDisponiveis = {{ chips | tojson | safe }};

/* AUTOCOMPLETE */
input.addEventListener("input", () => {
    const q = input.value.trim();
    autocompleteBox.innerHTML = "";
    if (q.length < 2) {
        autocompleteBox.style.display = "none";
        return;
    }

    fetch(`/movimentacao/buscar?q=${q}`)
        .then(r => r.json())
        .then(data => {
            autocompleteBox.innerHTML = "";
            data.forEach(chip => {
                const item = document.createElement("div");
                item.classList.add("autocomplete-item");
                item.innerHTML = `${chip.numero} — ${chip.operadora}`;
                item.onclick = () => carregarTimeline(chip.sk_chip, chip.numero);
                autocompleteBox.appendChild(item);
            });
            autocompleteBox.style.display = "block";
        });
});

/* CARREGAR TIMELINE */
function carregarTimeline(sk, label) {
    input.value = label;
    timeline.innerHTML = "";
    loading.style.display = "block";
    autocompleteBox.style.display = "none";

    fetch(`/movimentacao/historico/${sk}`)
        .then(r => {
            if (!r.ok) throw new Error("Falha ao carregar histórico");
            return r.json();
        })
        .then(data => {
            eventosGlobais = data;
            loading.style.display = "none";
            renderTimeline(data);
        })
        .catch(() => {
            loading.style.display = "none";
            timeline.innerHTML = `
                <div class="timeline-item">
                    <div class="timeline-icon"><i class="fas fa-triangle-exclamation"></i></div>
                    <div class="timeline-card">
                        <div class="timeline-title">Falha ao carregar</div>
                        <div class="timeline-desc">Tente novamente em alguns instantes.</div>
                    </div>
                </div>`;
        });
}

/* RENDER */
function renderTimeline(lista) {
    timeline.innerHTML = "";

    if (!lista.length) {
        timeline.innerHTML = `
            <div class="timeline-item">
                <div class="timeline-icon"><i class="fas fa-info"></i></div>
                <div class="timeline-card">
                    <div class="timeline-title">Nenhum histórico</div>
                    <div class="timeline-desc">Este chip ainda não possui eventos registrados.</div>
                </div>
            </div>`;
        return;
    }

    lista.forEach(ev => {
        const icone =
            ev.categoria === "APARELHO" ? "fa-mobile-screen" :
            ev.categoria === "MOVIMENTO" ? "fa-exchange-alt" :
            "fa-bolt";

        const badge =
            ev.categoria === "APARELHO" ? "b-aparelho" :
            ev.categoria === "MOVIMENTO" ? "b-movimento" :
            "b-evento";

        timeline.innerHTML += `
            <div class="timeline-item">
                <div class="timeline-icon"><i class="fas ${icone}"></i></div>
                <div class="timeline-card">
                    <div class="badges"><span class="badge ${badge}">${ev.categoria}</span></div>
                    <div class="timeline-title">${ev.tipo_evento || "Evento"}</div>
                    <div class="timeline-date">${ev.data_fmt || ""}</div>
                    <div class="timeline-desc">
                        ${ev.valor_antigo ? `<b>Antes:</b> ${ev.valor_antigo}<br>` : ""}
                        ${ev.valor_novo ? `<b>Depois:</b> ${ev.valor_novo}<br>` : ""}
                        ${ev.origem ? `<b>Origem:</b> ${ev.origem}<br>` : ""}
                        ${ev.observacao ? `<b>Obs:</b> ${ev.observacao}` : ""}
                    </div>
                </div>
            </div>`;
    });
}

/* FILTROS */
document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll(".filter-btn").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");

        const f = btn.dataset.filter;
        if (f === "ALL") renderTimeline(eventosGlobais);
        else renderTimeline(eventosGlobais.filter(e => e.categoria === f));
    };
});

document.addEventListener("DOMContentLoaded", () => {
    if (!Array.isArray(chipsDisponiveis) || !chipsDisponiveis.length) {
        timeline.innerHTML = `<p class="timeline-desc">Nenhum chip disponível para consulta.</p>`;
        return;
    }
    const quick = document.getElementById("quickChips");
    chipsDisponiveis.slice(0, 6).forEach(chip => {
        const bt = document.createElement("button");
        bt.type = "button";
        bt.className = "quick-chip-btn";
        bt.textContent = `${chip.numero} (${chip.operadora || "-"})`;
        bt.onclick = () => carregarTimeline(chip.sk_chip, chip.numero || "");
        quick.appendChild(bt);
    });
    const primeiroChip = chipsDisponiveis[0];
    if (primeiroChip?.sk_chip) {
        carregarTimeline(primeiroChip.sk_chip, primeiroChip.numero || "");
    }
});
</script>

{% endblock %}
